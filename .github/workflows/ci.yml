name: CI
on:
  push:
    branches: [main, dev, ci]
  pull_request:
    branches: [main, dev, ci]


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: uv python install 3.10
    - name: Install dependencies
      run: uv sync --extra dev

    - name: ruff
      run: uv run ruff check .

    - name: pylint
      run: uv run pylint src/

    - name: yamllint
      run: uv run yamllint .

    - name: hadolint (Dockerfile)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile

    - name: hadolint (Dockerfile.airflow)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile.airflow

    - name: hadolint (Dockerfile.api)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile.api

    - name: hadolint (Dockerfile.streamlit)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile.streamlit


  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python
      run: uv python install 3.10
    - name: Install dependencies
      run: uv sync --extra dev

    - name: Load all repo secrets as env vars
      env:
        SECRETS_CONTEXT: ${{ toJson(secrets) }}
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "$SECRETS_CONTEXT" | jq -r "to_entries[] | \"\(.key)<<$EOF\n\(.value)\n$EOF\"" >> $GITHUB_ENV

    - name: pytest
      run: uv run pytest

  analysis:
    name: Security scan (Trivy)
    depends_on: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Trivy scan — filesystem
      uses: aquasecurity/trivy-action@latest
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 1
        ignore-unfixed: true
        severity: CRITICAL,HIGH

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app
          git pull origin main
          docker compose build
          docker compose up -d
