x-airflow-common: &airflow-common
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__FERNET_KEY=JadWNDV0h__Tf_9V4nJv4J0Oqk3q7YeKH8bbJtE3iwU=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=mysql+pymysql://projet_user:projet_pass@database:3306/projet_etudes_db
    - AIRFLOW__WEBSERVER__BASE_URL=http://localhost/airflow
    - AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX=True
    - AIRFLOW__WEBSERVER__SECRET_KEY=changeme-use-a-strong-random-value-in-prod
    # Makes the project packages importable inside the container
    - PYTHONPATH=/opt/airflow/src:/opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./shared:/opt/airflow/shared
    - ./conf:/opt/airflow/conf
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    - database

services:
  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - streamlit
      - airflow-webserver



  # ── Airflow init ──────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    restart: "no"
    command: ["bash", "-c", "i=0; until airflow db check 2>/dev/null; do i=$$((i+1)); [ $$i -ge 30 ] && exit 1; echo \"Waiting for DB ($$i/30)...\"; sleep 5; done && airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null; exit 0"]

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # ── MariaDB (Airflow metadata) ────────────────────────────────────────────
  database:
    image: mariadb:latest
    container_name: projet_etudes_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sqlpass
      MYSQL_DATABASE: projet_etudes_db
      MYSQL_USER: projet_user
      MYSQL_PASSWORD: projet_pass
    ports:
      - "3360:3306"

  # ── Ollama (CPU-only LLM) ─────────────────────────────────────────────────
  # mistral:7b (~4 GB) — better instruction following than llama3.2:3b,
  # fits in 16 GB RAM, expect ~2-4 min/response on CPU.
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: always
    volumes:
      - ollama-data:/root/.ollama
    # No host port binding — only reachable inside Docker by the api container.
    entrypoint: ["/bin/sh", "-c",
     "ollama serve & until ollama list 2>/dev/null; do sleep 2; done; ollama pull qwen2:1.5b; wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q qwen2"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s  # ~4 GB download on first boot

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fakeshield-api
    restart: always
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2:1.5b
    ports:
      - "8080:8080"
    volumes:
      # KMeans + TF-IDF artifacts written by the vectorisation pipeline
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Streamlit ─────────────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: fakeshield-streamlit
    restart: always
    env_file: .env
    environment:
      - API_URL=http://api:8080/
    depends_on:
      api:
        condition: service_healthy

  # ── Node Exporter (host metrics: CPU / RAM / disk) ────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports: ["9090:9090"]
    volumes:
      - ./conf/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
      - node-exporter

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports: ["3000:3000"]
    depends_on:
      - prometheus
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./conf/grafana/provisioning:/etc/grafana/provisioning
      - ./conf/grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  airflow-logs:
  airflow-plugins:
  ollama-data:
